name: 'GitHub Virtual Collaborators'
description: 'Runs multi-agent collaboration in GitHub using @#mention, /assign, and per-agent inbox'

inputs:
  github-token:
    description: >
      GitHub token used by this action.
      For `label` backend, `GITHUB_TOKEN` is usually enough.
      For `project` backend, a PAT with `repo` and `project` scopes may be required.
    required: true

  metadata-backend:
    description: >
      Metadata backend to store VC tags. Use `label` (default) or `project`.
    required: false
    default: 'label'

  label-prefix:
    description: >
      Label prefix used in `label` backend mode.
      Example labels: `vc:author:alice`, `vc:participant:bob`.
    required: false
    default: 'vc:'

  label-default-color:
    description: >
      Default hex color (without #) used when auto-creating labels in `label` backend.
      Example: `b0b0b0`.
    required: false
    default: 'b0b0b0'

  project-owner:
    description: 'Organization or user name that owns the GitHub Project.'
    required: false

  project-number:
    description: 'The number of the target GitHub Project (Projects v2).'
    required: false

  project-tags-field-name:
    description: 'Name of the Text-type Custom Field in the Project used to store Tags.'
    required: false
    default: 'Tags'

  virtual-collaborators:
    description: >
      Comma-separated list of allowed VC names (without @# prefix).
      When specified, only these VCs are processed.
      When omitted, all @#name patterns found are treated as VCs.
    required: false
    default: ''

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'users'
  color: 'gray-dark'
